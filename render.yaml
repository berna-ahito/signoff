services:
  - type: web
    name: signoff
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd frontend
      npm ci
      npm run build
      cd ..
      alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: RUN_SEED_ON_START
        value: false
